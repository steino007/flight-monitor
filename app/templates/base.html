<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flight Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }

        nav { display: flex; gap: 1.5rem; align-items: center; padding: 0.75rem 0; margin-bottom: 1.5rem; border-bottom: 1px solid #1e293b; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: #f8fafc; }
        nav .spacer { flex: 1; }

        .container { max-width: 900px; margin: 0 auto; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
        td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #1e293b; font-size: 0.95rem; }
        tr:hover { background: #1e293b; }

        .btn { display: inline-block; padding: 0.4rem 0.8rem; font-size: 0.85rem; border: none; border-radius: 4px; cursor: pointer; color: white; text-decoration: none; }
        .btn-primary { background: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }

        input, select { padding: 0.4rem 0.6rem; font-size: 0.9rem; border: 1px solid #334155; border-radius: 4px; background: #1e293b; color: #e2e8f0; }
        input:focus, select:focus { outline: none; border-color: #2563eb; }

        .status-cancelled { color: #f87171; }
        .status-landed { color: #4ade80; }
        .status-active { color: #60a5fa; }
        .status-scheduled { color: #94a3b8; }
        .status-probably_landed { color: #facc15; }

        .empty { text-align: center; padding: 3rem 1rem; color: #64748b; }

        .actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }

        .route-tag { display: inline-block; background: #1e293b; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85rem; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <span class="brand">Flight Monitor</span>
            <a href="{{ url_for('main.dashboard') }}">Vluchten</a>
            <a href="{{ url_for('main.manage_routes') }}">Routes</a>
            <span class="spacer"></span>
            <a href="{{ url_for('main.logout') }}">Uitloggen</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
