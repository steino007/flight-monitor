<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flight Monitor — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 360px; padding: 2rem; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        form { display: flex; flex-direction: column; gap: 0.75rem; }
        input { padding: 0.6rem; font-size: 1rem; border: 1px solid #334155; border-radius: 4px; background: #1e293b; color: #e2e8f0; }
        input:focus { outline: none; border-color: #2563eb; }
        button { padding: 0.6rem; font-size: 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .error { color: #f87171; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Flight Monitor</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Wachtwoord" autofocus>
            <button type="submit">Inloggen</button>
        </form>
    </div>
</body>
</html>
