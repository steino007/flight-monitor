{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <h1 class="page-title">Routes beheren</h1>
</div>

<!-- Add route form -->
<div class="card" style="padding:1.25rem; margin-bottom:1.5rem;">
    <form method="POST" style="display:flex; gap:0.75rem; align-items:end; flex-wrap:wrap;">
        <div>
            <label style="display:block; font-size:0.7rem; font-weight:600; color:var(--text-muted); margin-bottom:0.3rem; text-transform:uppercase; letter-spacing:0.05em;">Vertrek (IATA)</label>
            <input type="text" name="origin" placeholder="SGN" maxlength="3" style="width:90px; text-transform:uppercase;" required>
        </div>
        <div>
            <label style="display:block; font-size:0.7rem; font-weight:600; color:var(--text-muted); margin-bottom:0.3rem; text-transform:uppercase; letter-spacing:0.05em;">Aankomst (IATA)</label>
            <input type="text" name="destination" placeholder="PQC" maxlength="3" style="width:90px; text-transform:uppercase;" required>
        </div>
        <div>
            <label style="display:block; font-size:0.7rem; font-weight:600; color:var(--text-muted); margin-bottom:0.3rem; text-transform:uppercase; letter-spacing:0.05em;">Maatschappij</label>
            <input type="text" name="airline" placeholder="TK" maxlength="3" style="width:90px; text-transform:uppercase;">
        </div>
        <button class="btn btn-primary" type="submit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Toevoegen
        </button>
    </form>
</div>

<!-- Route list -->
{% if routes %}
<div class="card" style="overflow:hidden;">
    <table>
        <thead>
            <tr>
                <th>Route</th>
                <th>Maatschappij</th>
                <th>Toegevoegd</th>
                <th style="width:1%;"></th>
            </tr>
        </thead>
        <tbody>
            {% for r in routes %}
            <tr>
                <td><span class="route-name" style="font-size:0.85rem;">{{ r.origin }} → {{ r.destination }}</span></td>
                <td>
                    <form method="POST" action="{{ url_for('main.edit_route', route_id=r.id) }}" style="display:flex; gap:0.35rem; align-items:center;">
                        <input type="text" name="airline" value="{{ r.airline or '' }}" placeholder="—" maxlength="3" style="width:65px; text-transform:uppercase; font-size:0.82rem; padding:0.3rem 0.5rem;">
                        <button class="btn btn-sm" type="submit">Opslaan</button>
                    </form>
                </td>
                <td style="color:var(--text-secondary); font-size:0.82rem;">{{ r.created_at[:10] }}</td>
                <td>
                    <form method="POST" action="{{ url_for('main.delete_route', route_id=r.id) }}" style="display:inline;" onsubmit="return confirm('Route {{ r.origin }} → {{ r.destination }} verwijderen?')">
                        <button class="btn btn-danger btn-sm" type="submit">Verwijderen</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="card">
    <div class="empty">
        <p>Nog geen routes. Voeg hierboven je eerste route toe.</p>
    </div>
</div>
{% endif %}

{% endblock %}
